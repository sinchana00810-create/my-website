<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Found My Heart</title>
    <style>
        /* 1. SOFT AESTHETIC DESIGN */
        body {
            background-color: #fff5f7; /* Very pale pink */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #7d4f5c;
            text-align: center;
            overflow-x: hidden;
        }

        /* 2. POLAROID PHOTO FRAME */
        .polaroid {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: rotate(-3deg); /* Slight tilt for cuteness */
            border-radius: 2px;
            margin-bottom: 30px;
            animation: slideUp 1s ease-out;
        }

        .polaroid img {
            width: 220px;
            height: 220px;
            object-fit: cover; /* Keeps the photo from stretching */
            border: 1px solid #eee;
        }

        .polaroid-text {
            margin-top: 15px;
            font-family: 'Brush Script MT', cursive; /* Handwriting font */
            font-size: 1.5rem;
            color: #ff4d6d;
        }

        /* 3. THE LOVE COUPON */
        .coupon {
            background-color: white;
            border: 2px dashed #ffb3c1;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 5px 15px rgba(255, 179, 193, 0.2);
            animation: fadeIn 2s forwards;
        }

        .coupon h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #ff4d6d;
            text-transform: uppercase;
        }

        .coupon p {
            font-size: 0.9rem;
            margin: 10px 0;
        }

        /* 4. ANIMATIONS */
        @keyframes slideUp {
            from { transform: translateY(50px) rotate(0deg); opacity: 0; }
            to { transform: translateY(0) rotate(-3deg); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .floating-heart {
            position: absolute;
            color: #ffb3c1;
            opacity: 0.6;
            animation: float 4s infinite ease-in;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <h1 style="margin-bottom: 20px;">Yay! You're Here! ❤️</h1>

    <div class="polaroid">
        <img src="file:///storage/emulated/0/Android/data/com.teejay.trebedit/files/TrebEdit user files/surprise /inshot/IMG_20260330_200326.jpg" alt="" height="300px" width="350px">
        <div class="polaroid-text">My Favorite Person</div>
    </div>

    <div class="coupon">
        <h2>Special Love Voucher</h2>
        <p>Valid for:</p>
        <h3 style="color: #ff4d6d; margin: 5px 0;">ONE MOVIE NIGHT + CUDDLES</h3>
        <p style="font-size: 0.7rem; color: #aaa;">*Expires Never</p>
    </div>

    <p style="margin-top: 40px; font-size: 0.8rem; color: #ffb3c1;">Click anywhere to see more love!</p>

    <script>
        // Clicking creates a heart at the touch location
        document.addEventListener('click', (e) => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        });
    </script>

</body>
</html>
