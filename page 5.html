<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Universe of Love</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff0f3;
            font-family: 'Georgia', serif;
            color: #ff4d6d;
            overflow: hidden;
            text-align: center;
        }

        #love-container {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #love-text {
            font-size: 2.8rem;
            font-weight: bold;
            /* FASTER FADE: Changed from 0.8s to 0.3s */
            transition: opacity 0.3s ease-in-out; 
            opacity: 0;
            text-shadow: 2px 2px 10px rgba(255, 77, 109, 0.2);
        }

        .heart {
            font-size: 50px;
            animation: pulse 3s infinite; /* Faster heartbeat */
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .next-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: #ff85a1;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.3);
            transition: 0.3s;
        }

        .next-btn:hover {
            background: #ff4d6d;
        }
    </style>
</head>
<body>

    <div class="heart">💖</div>

    <div id="love-container">
        <h1 id="love-text">I love you</h1>
    </div>
   <p style="color: #a3808a; font-style: italic;">(Watch closely... it changes for you)</p>
    <a href="page 6.html" class="next-btn">Keep going... 🌸</a>

    <script>
        // All your phrases from before
        const phrases = [
            "I love you", "Main tumse pyaar karta hoon", "Naanu ninna preetisuttini", 
            "Naan unnai kathalikiren", "Nenu ninnu premisthunnanu", "Njan ninne snehikkunnu",
            "Te amo", "Te quiero", "Je t’aime", "Ich liebe dich", "Ti amo", "Eu te amo",
            "Ik hou van jou", "Jag älskar dig", "Szeretlek", "Ya tebya lyublyu", 
            "Seni seviyorum", "Aishiteru", "Saranghae", "Wǒ ài nǐ", "Mahal kita",
            "Aku cinta kamu", "Ninakupenda", "S'agapo", "Ana uhibbuka"
        ];

        let index = 0;
        const textElement = document.getElementById('love-text');

        function updateText() {
            textElement.style.opacity = 0; 
            
            setTimeout(() => {
                index = (index + 1) % phrases.length;
                textElement.innerText = phrases[index];
                textElement.style.opacity = 1; 
            }, 300); // Faster switch
        }

        textElement.style.opacity = 1;
        
        // FASTER INTERVAL: Changed from 3000ms to 1200ms (1.2 seconds)
        setInterval(updateText, 1200); 
    </script>
</body>
</html>
