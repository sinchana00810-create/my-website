<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #1a1b2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ef476f;
            text-align: center;
        }

        .heart {
            background-color: #ef476f;
            height: 80px;
            width: 80px;
            position: relative;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 30px rgba(239, 71, 111, 0.5);
            margin-bottom: 100px;
        }

        .heart::before, .heart::after {
            content: "";
            background-color: #ef476f;
            border-radius: 50%;
            height: 80px;
            width: 80px;
            position: absolute;
        }
        .heart::before { top: -40px; left: 0; }
        .heart::after { left: 40px; top: 0; }

        @keyframes beat {
            to { transform: scale(1.15) rotate(-45deg); }
        }

        .btn {
            background: none;
            border: 2px solid #06d6a0;
            color: #06d6a0;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(6, 214, 160, 0.2);
        }

        .btn:active {
            transform: scale(0.9);
            background-color: #06d6a0;
            color: #1a1b2e;
        }
    </style>
</head>
<body>

    <div class="heart"></div>
     
    <div class="message">
        <p>Hello World!</p>
        <p><b>Status:</b> Extremely in love with you.</p>
        <p>press the button for the special surprise 😉</p>
    </div>
    
  
    <a href="page%202.html" class="btn">Open Surprise</a>

<style>
    .btn {
        display: inline-block;
        padding: 15px 30px;
        background-color: #ff4d6d;
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        transition: transform 0.2s ease;
        box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
    }

    .btn:active {
        transform: scale(0.9); /* Makes it feel like a real click on a phone */
    }
</style>            


</body>
</html>
