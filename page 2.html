<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #1a1b2e;
            color: #ffd166;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            text-align: center;
        }

        .container {
            border: 1px solid #ffd166;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 209, 102, 0.3);
        }

        h1 { font-size: 2rem; }
        
        .typewriter {
            overflow: hidden;
            border-right: .15em solid #ef476f;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #ef476f; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>YOU FOUND IT!</h1>
        <p class="typewriter">Initialization complete...</p>
        <p style="color: #06d6a0; margin-top: 20px;">
           "You are my favorite line of code in this messy world."
        </p>
        <p>❤️ I love you! ❤️</p>
        <p>This is not the surprise 😅</p>
         <p>press the button for the real special surprise 😉</p>
         </div>
           <style>
  .cute-btn {
    padding: 15px 35px;
    background-color: #ff4d6d;
    color: white;
    font-family: 'Arial', sans-serif;
    font-size: 20px;
    border-radius: 50px;
    border: none;
    text-decoration: none;
    display: inline-block;
    animation: wiggle 2s infinite;
    box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    75% { transform: rotate(-3deg); }
  }

  .cute-btn:active {
    transform: scale(0.9);
    background-color: #ff758f;
  }
</style>
<div style="text-align: center; margin-top: 50px;">
  
    
    <a href="page 3.html" style="text-decoration: none;">
        <button style="background-color: #ff85a1; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 133, 161, 0.3);">
            Open Surprise 
        </button>
    </a>
</div>


    

</body>
</html>
